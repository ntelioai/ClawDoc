name: Release

# Runs the full electron-forge build matrix when a v* tag is pushed,
# then uploads the installers to the GitHub Release for that tag.
#
# Trigger by running:
#   git tag v0.2.0 && git push --tags
#
# A draft release is created/updated automatically; promote it to public
# in the GitHub UI once you've checked the artifacts.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create / upload to the release

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: out/make/**/*
            forge_args: --platform=darwin --arch=universal
          - os: windows-latest
            artifact_glob: out/make/**/*
            forge_args: ""
          - os: ubuntu-latest
            artifact_glob: out/make/**/*
            forge_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-pty needs a native toolchain on Linux. macOS and Windows runners
      # come pre-equipped; Ubuntu needs the rebuild headers explicitly.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64 \
            rpm fakeroot dpkg

      - name: Install
        run: npm ci

      - name: Build (electron-forge make)
        env:
          # Default to ad-hoc signing on macOS; override in repo secrets to
          # use a real Developer ID for distribution.
          CLAWDOC_SIGN_IDENTITY: ${{ secrets.CLAWDOC_SIGN_IDENTITY || '-' }}
        run: npm run make -- ${{ matrix.forge_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawdoc-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.nupkg" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "RELEASES" \
          \) -exec cp {} release/ \;
          ls -la release

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Draft so you can review the assets before going public.
          draft: true
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
