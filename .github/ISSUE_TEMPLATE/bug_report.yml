name: Bug report
description: Something in ClawDoc doesn't work the way it should.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **For security vulnerabilities, please use [private disclosure](https://github.com/ntelioai/ClawDoc/security/advisories/new) or email security@ntelio.ai instead.**

  - type: input
    id: version
    attributes:
      label: ClawDoc version
      description: From the About dialog, or the `version` field in `package.json` if running from source. Include the commit SHA if from a non-release build.
      placeholder: "0.1.0 (or commit abc1234)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "macOS 14.5, Windows 11 23H2, Ubuntu 24.04..."
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ClawDoc with workspace X
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: |
        From `clawdoc.log`:
        - macOS: `~/Library/Application Support/ClawDoc/clawdoc.log`
        - Linux: `~/.config/ClawDoc/clawdoc.log`
        - Windows: `%APPDATA%\ClawDoc\clawdoc.log`
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, screen recordings, related issues, workspace size, network conditions — anything that helps reproduce.
