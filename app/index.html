<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClawDoc</title>
<link rel="icon" type="image/png" href="/app/assets/favicon-clawdoc.png">
<link rel="apple-touch-icon" href="/app/assets/clawdoc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faster+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.51/bundles/css/diff2html.min.css">
<link rel="stylesheet" href="/app/style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <a href="#folder=" class="brand-link" title="ClawDoc">
        <img class="brand-logo" src="/app/assets/clawdoc-logo.png" alt="">
        <span class="brand-mark">ClawDoc</span>
      </a>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search" placeholder="Search titles, content, paths…   /  to focus" autocomplete="off" spellcheck="false">
      <div id="search-results" class="search-results hidden"></div>
    </div>
    <div class="topbar-actions">
      <span id="status" class="status"></span>
      <button id="git-pill" class="git-pill hidden" title="GitHub sync status — click for settings">
        <svg class="git-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2 .37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        <span class="git-pill-text"></span>
      </button>
      <button id="mc-toggle" title="Two-pane file manager mode (drag-and-drop to reorganize)" aria-label="Toggle two-pane file manager">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>
      </button>
      <button id="claude-toggle" title="Open Claude for this workspace">Claude</button>
      <button id="settings-toggle" class="topbar-icon-btn" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>
  <div class="tabbar" id="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="tab-new" id="tab-new" title="New tab (Cmd+T)">+</button>
  </div>
  <main class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <input id="tree-filter" placeholder="Filter folders…   Cmd+K" autocomplete="off" spellcheck="false">
        <button id="tree-expand-all" class="tree-btn" title="Expand all folders" aria-label="Expand all folders">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8,11.5L4.706,8.878l-1.416,1.416L8,14l4.706-3.706l-1.416-1.416L8,11.5z M8,4.5l3.294,2.622l1.416-1.416L8,2L3.294,5.706l1.416,1.416L8,4.5z"/></svg>
        </button>
        <button id="tree-collapse-all" class="tree-btn" title="Collapse all folders" aria-label="Collapse all folders">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.414,15.414L8,11.828L11.586,15.414L13,14L8,9L3,14L4.414,15.414ZM11.586,0.586L8,4.172L4.414,0.586L3,2L8,7L13,2L11.586,0.586Z"/></svg>
        </button>
        <button id="tree-new-file" class="tree-btn" title="New file in the focused folder" aria-label="New file">
          <svg width="14" height="14" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7,9 7,29 25,29 25,9"/><polyline points="19,3 19,9 25,9 19,3 11,3"/><path d="M7,9.1c-1.2,0-2.4,0.6-4,1.9c2.6-3.2,2.6-4.8,0-8c3.2,2.6,4.8,2.6,8,0c-2.6,3.2-2.6,4.8,0,8"/></svg>
        </button>
        <button id="tree-new-folder" class="tree-btn" title="New folder in the focused folder" aria-label="New folder">
          <svg width="14" height="14" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7,25.1c-1.2,0-2.4,0.6-4,1.9c2.6-3.2,2.6-4.8,0-8c3.2,2.6,4.8,2.6,8,0c-2.6,3.2-2.6,4.8,0,8"/><path d="M11,27h16c1.1,0,2-0.9,2-2V11c0-1.1-0.9-2-2-2l-9.5,0"/><path d="M28.5,26.3L17.5,9L15,5h-2.5H5C3.9,5,3,5.9,3,7v12"/></svg>
        </button>
        <button id="tree-display-toggle" class="tree-btn" title="Show filenames instead of document titles" aria-label="Toggle tree display: titles or filenames">
          <svg class="tree-display-icon tree-display-icon-title" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V4h14v2"/><path d="M12 4v16"/><path d="M9 20h6"/></svg>
        <svg class="tree-display-icon tree-display-icon-filename" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
      </div>
      <div id="tree" class="tree" tabindex="0"></div>
      <div class="sidebar-foot">
        <span id="doc-count"></span>
      </div>
    </aside>
    <div id="sidebar-resizer" class="sidebar-resizer" title="Drag to resize · double-click to reset"></div>
    <section class="content">
      <div id="breadcrumb" class="breadcrumb"></div>
      <div id="viewer" class="viewer">
        <div class="empty">
          <div class="empty-title">ClawDoc</div>
          <div class="empty-sub">Browse your <code>.md</code>, <code>.html</code>, and <code>.pdf</code> documents.</div>
          <div class="empty-hints">
            <div><kbd>/</kbd> search everything</div>
            <div><kbd>Cmd</kbd>+<kbd>K</kbd> filter folders</div>
            <div><kbd>Cmd</kbd>+<kbd>P</kbd> quick-open by filename</div>
            <div><kbd>Esc</kbd> clear</div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="preview-modal" class="preview-modal hidden" role="dialog" aria-labelledby="preview-title">
    <div class="preview-panel">
      <div class="preview-head">
        <div class="preview-title" id="preview-title"></div>
        <div class="preview-sub" id="preview-sub"></div>
        <button id="preview-open" class="preview-btn" title="Open in viewer">Open</button>
        <button id="preview-close" class="preview-close" title="Close (Esc or Space)" aria-label="Close">✕</button>
      </div>
      <div class="preview-body" id="preview-body"></div>
    </div>
  </div>
  <div id="mc-mode" class="mc-mode hidden">
    <div class="mc-bar">
      <span class="mc-bar-title">Two-pane mode</span>
      <span class="mc-bar-hint">Drag files between panes to move them · double-click a file to open · Esc to exit</span>
      <button id="mc-exit" class="mc-bar-exit" title="Exit (Esc)">Exit</button>
    </div>
    <div class="mc-panes">
      <section class="mc-pane" data-pane="a">
        <div class="mc-pane-head">
          <input class="mc-pane-filter" data-pane-filter="a" placeholder="Filter…" autocomplete="off" spellcheck="false">
          <button class="tree-btn" data-pane-expand-all="a" title="Expand all folders in this pane" aria-label="Expand all folders">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8,11.5L4.706,8.878l-1.416,1.416L8,14l4.706-3.706l-1.416-1.416L8,11.5z M8,4.5l3.294,2.622l1.416-1.416L8,2L3.294,5.706l1.416,1.416L8,4.5z"/></svg>
          </button>
          <button class="tree-btn" data-pane-collapse-all="a" title="Collapse all folders in this pane" aria-label="Collapse all folders">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.414,15.414L8,11.828L11.586,15.414L13,14L8,9L3,14L4.414,15.414ZM11.586,0.586L8,4.172L4.414,0.586L3,2L8,7L13,2L11.586,0.586Z"/></svg>
          </button>
          <button class="tree-btn" data-pane-new-folder="a" title="New folder in the focused folder" aria-label="New folder">
            <svg width="14" height="14" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7,25.1c-1.2,0-2.4,0.6-4,1.9c2.6-3.2,2.6-4.8,0-8c3.2,2.6,4.8,2.6,8,0c-2.6,3.2-2.6,4.8,0,8"/><path d="M11,27h16c1.1,0,2-0.9,2-2V11c0-1.1-0.9-2-2-2l-9.5,0"/><path d="M28.5,26.3L17.5,9L15,5h-2.5H5C3.9,5,3,5.9,3,7v12"/></svg>
          </button>
        </div>
        <div class="mc-pane-tree" data-pane-tree="a"></div>
      </section>
      <div class="mc-panes-divider"></div>
      <section class="mc-pane" data-pane="b">
        <div class="mc-pane-head">
          <input class="mc-pane-filter" data-pane-filter="b" placeholder="Filter…" autocomplete="off" spellcheck="false">
          <button class="tree-btn" data-pane-expand-all="b" title="Expand all folders in this pane" aria-label="Expand all folders">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8,11.5L4.706,8.878l-1.416,1.416L8,14l4.706-3.706l-1.416-1.416L8,11.5z M8,4.5l3.294,2.622l1.416-1.416L8,2L3.294,5.706l1.416,1.416L8,4.5z"/></svg>
          </button>
          <button class="tree-btn" data-pane-collapse-all="b" title="Collapse all folders in this pane" aria-label="Collapse all folders">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.414,15.414L8,11.828L11.586,15.414L13,14L8,9L3,14L4.414,15.414ZM11.586,0.586L8,4.172L4.414,0.586L3,2L8,7L13,2L11.586,0.586Z"/></svg>
          </button>
          <button class="tree-btn" data-pane-new-folder="b" title="New folder in the focused folder" aria-label="New folder">
            <svg width="14" height="14" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7,25.1c-1.2,0-2.4,0.6-4,1.9c2.6-3.2,2.6-4.8,0-8c3.2,2.6,4.8,2.6,8,0c-2.6,3.2-2.6,4.8,0,8"/><path d="M11,27h16c1.1,0,2-0.9,2-2V11c0-1.1-0.9-2-2-2l-9.5,0"/><path d="M28.5,26.3L17.5,9L15,5h-2.5H5C3.9,5,3,5.9,3,7v12"/></svg>
          </button>
        </div>
        <div class="mc-pane-tree" data-pane-tree="b"></div>
      </section>
    </div>
  </div>
  <div id="quick-open" class="quick-open hidden">
    <div class="quick-open-panel">
      <input id="quick-open-input" placeholder="Quick open: type part of a filename or title…" autocomplete="off" spellcheck="false">
      <div id="quick-open-results" class="quick-open-results"></div>
    </div>
  </div>
  <div id="ctx-menu" class="ctx-menu hidden" role="menu"></div>
  <div id="settings-modal" class="settings-modal hidden" role="dialog" aria-labelledby="settings-title">
    <div class="settings-panel">
      <div class="settings-head">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="settings-close" title="Close (Esc)" aria-label="Close">✕</button>
      </div>
      <div class="settings-body" id="settings-body"></div>
    </div>
  </div>
  <div id="history-modal" class="history-modal hidden" role="dialog" aria-labelledby="history-title">
    <div class="history-panel">
      <div class="history-head">
        <h2 id="history-title">History</h2>
        <div class="history-doc" id="history-doc"></div>
        <button id="history-maximize" class="history-iconbtn" title="Maximize" aria-label="Maximize"></button>
        <button id="history-close" class="history-iconbtn history-close" title="Close (Esc)" aria-label="Close">✕</button>
      </div>
      <div class="history-body">
        <div class="history-commits" id="history-commits"></div>
        <div class="history-diff" id="history-diff"></div>
      </div>
    </div>
  </div>
  <aside id="chat-panel" class="chat-panel hidden">
    <div id="chat-resizer" class="chat-resizer" title="Drag to resize"></div>
    <div class="chat-head">
      <div class="chat-title">Claude Code</div>
      <div id="chat-context" class="chat-context"></div>
      <div class="chat-head-actions">
        <button id="chat-insert" title="Insert the selected file or folder at the cursor" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7H3V3h7"/></svg>
          <span>Insert</span>
        </button>
        <button id="chat-theme" title="Toggle terminal theme (dark/light)" aria-label="Toggle terminal theme">
          <svg class="theme-icon theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="theme-icon theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button id="chat-restart" title="Restart session">Restart</button>
        <button id="chat-close" title="Close (Esc when terminal not focused)">✕</button>
      </div>
    </div>
    <div id="terminal" class="terminal-host"></div>
    <div class="chat-foot">
      <span id="chat-status" class="chat-status">starting…</span>
    </div>
  </aside>
  <aside id="agent-panel" class="agent-panel hidden" data-term-theme="light">
    <div id="agent-resizer" class="chat-resizer" title="Drag to resize"></div>
    <div class="chat-head">
      <div class="chat-title">Claude ✦</div>
      <div id="agent-context" class="chat-context"></div>
      <div class="chat-head-actions">
        <select id="agent-mode" class="agent-mode" title="How Claude handles edits in this session. Changing it restarts the conversation.">
          <option value="acceptEdits">Edit automatically</option>
          <option value="default">Ask before edits</option>
          <option value="plan">Plan mode</option>
          <option value="bypassPermissions">Auto (no prompts)</option>
        </select>
        <button id="agent-theme" title="Toggle theme (dark/light)" aria-label="Toggle theme">
          <svg class="theme-icon theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="theme-icon theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button id="agent-restart" title="Restart session (clears the conversation)">Restart</button>
        <button id="agent-close" title="Close (Esc when composer not focused)">✕</button>
      </div>
    </div>
    <div id="agent-log" class="agent-log" role="log" aria-live="polite" aria-label="Claude conversation"></div>
    <div class="agent-composer">
      <button id="agent-insert" class="agent-insert" title="Insert the selected file/folder path" disabled aria-label="Insert selected path">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7H3V3h7"/></svg>
      </button>
      <textarea id="agent-input" class="agent-input" rows="1" placeholder="Message Claude…  (Enter to send, Shift+Enter for newline)" spellcheck="false"></textarea>
      <button id="agent-submit" class="agent-submit" title="Send (Enter)" aria-label="Send">
        <svg class="as-icon as-send" viewBox="0 0 15 15" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 0.792892L11.8536 5.14645L11.1464 5.85355L8 2.70711V12H7V2.70711L3.85355 5.85355L3.14645 5.14645L7.5 0.792892ZM14 13V14H1V13H14Z"/></svg>
        <svg class="as-icon as-stop" viewBox="-5.5 0 32 32" width="15" height="15" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M0 6.563v18.875c0 0.531 0.438 0.969 0.969 0.969h18.875c0.531 0 0.969-0.438 0.969-0.969v-18.875c0-0.531-0.438-0.969-0.969-0.969h-18.875c-0.531 0-0.969 0.438-0.969 0.969z"/></svg>
      </button>
    </div>
    <div class="chat-foot">
      <span id="agent-status" class="chat-status">idle</span>
    </div>
  </aside>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.51/bundles/js/diff2html-ui.min.js"></script>
<script src="/app/vendor/minisearch/minisearch.min.js"></script>
<script src="/app/app.js"></script>
</body>
</html>
